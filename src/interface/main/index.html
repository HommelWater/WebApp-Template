<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widgets=resizes-content">
	<link rel="icon" href="/interface/auth/icon.jpg" type="image/png">
  <link rel="stylesheet" href="/interface/auth/style.css">
  <script>
    document.addEventListener('DOMContentLoaded', async ()=>{
        const sk = localStorage.getItem("session");
        document.getElementById("session_key").innerText = `Your session key: ${sk}`;
        if (sk === "" || sk === null){
            location.href = "/auth";
        }
        const json = await apiRequest("/server_data_example", "POST", JSON.stringify({"session":sk}));
        document.getElementById("server_data").innerText = JSON.stringify(json, null, 2);
    });

    async function apiRequest(url, method = 'GET', data = null) {
        const options = {
            method: method,
        };

        if (data) {
            if (typeof data === 'string') {
                options.body = data;
                options.headers = { 'Content-Type': 'application/json' };
            } else {options.body = data;}
        }
        const response = await fetch(url, options);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        return response.json();
    }
  </script>
</head>
<body>
    <p id="session_key"></p>
    <p id="server_data" style="text-align: left;"></p>
</body>
</html>
